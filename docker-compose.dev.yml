services:
  db:
    build:
      context: .
      dockerfile: docker/scripts/dbfinlumia.Dockerfile
    image: finlumia/db:postgres18
    container_name: finlumiadb
    environment:
      # POSTGRES_USER substitui o superusuario padrao "postgres" da imagem oficial.
      POSTGRES_USER: "${DB_USERNAME}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: "${DB_NAME:-finlumia_transactions}"
    ports:
      - "28079:5432"
    volumes:
      - finlumia-postgres-data:/var/lib/postgresql
      - ./docker/backup:/docker-entrypoint-initdb.d/backup:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME:-finlumia_transactions}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  dev:
    image: finlumia/dev:almalinux10
    container_name: finlumiadev
    depends_on:
      db:
        condition: service_healthy
    #Fica esperando novas linhas que não serão preenchidas.
    # tail -> exibe o final do arquivo as 10 últimas linhas
    # -f -> fica exibindo o que há no tail
    # /dev/null -> diretório linux onde tudo é deletado
    command: ["tail", "-f", "/dev/null"]
    #
    working_dir: /workspace
    volumes:
      # Linux apontando para a pasta onde está o repositório.
      - .:/workspace
      # Grava todo o cache para dentro do volume docker
      - gradle-cache:/home/finlumia/.gradle
      # Habilita a comunicação docker socket com a máquina server
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "40570:40570"
    # Container aceita entrada do teclado
    stdin_open: true
    # Habilita funcionalidades de terminal como cores, cursor, prompts interativos.
    tty: true

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: finlumia-minio
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
      MINIO_API_CORS_ALLOW_ORIGIN: http://localhost:3000
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  docs:
    build:
      context: .
      dockerfile: docker/scripts/docs.Dockerfile
    image: finlumia/docs:latest
    container_name: finlumia-docs
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://db:5432/${DB_NAME:-finlumia_transactions}"
      SPRING_DATASOURCE_USERNAME: "${DB_USERNAME}"
      SPRING_DATASOURCE_PASSWORD: "${DB_PASSWORD}"
      MINIO_INTERNAL_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: http://localhost:9000
      MINIO_ACCESS_KEY: "${MINIO_ROOT_USER}"
      MINIO_SECRET_KEY: "${MINIO_ROOT_PASSWORD}"
      MINIO_BUCKET: finlumia-support-attachments
      ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "28082:28082"
    restart: unless-stopped

volumes:
  gradle-cache:
  finlumia-postgres-data:
  minio-data:
