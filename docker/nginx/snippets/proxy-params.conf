##############################################################
# proxy-params.conf — Headers de proxy comuns
# Include em cada bloco location com: include snippets/proxy-params.conf;
##############################################################

# Repassa o host original para que o backend possa logar corretamente
proxy_set_header  Host              $http_host;

# IPs reais do cliente (necessário para logs e rate-limit no backend)
proxy_set_header  X-Real-IP         $remote_addr;
proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;

# Protocolo original: o backend precisa saber se veio HTTPS
# para montar URLs absolutas (ex: redirect de OAuth)
proxy_set_header  X-Forwarded-Proto $scheme;

# Passa o header Origin intacto — o Spring Security usa para
# validar o CORS contra a lista ALLOWED_ORIGINS
proxy_set_header  Origin            $http_origin;

# Mantém conexões HTTP/1.1 com keepalive para os upstreams
proxy_http_version 1.1;
proxy_set_header   Connection       "";
