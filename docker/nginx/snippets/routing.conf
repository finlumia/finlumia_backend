##############################################################
# routing.conf — Regras de roteamento dos microserviços
#
# Incluído por finlumia-homolog.conf e finlumia-prod.conf.
# Não usar diretamente como bloco server.
#
# ORDEM IMPORTANTE: Nginx usa a correspondência mais específica.
# Blocos com = (exato) > ^~ (prefixo prioritário) > regex > prefixo genérico
##############################################################

# ==============================================================
# BLOCO /internal — NUNCA expor externamente
# Inclui Swagger interno, API docs internas, endpoints service-to-service
# ==============================================================
location /internal/ {
    deny all;
    return 403;
}

# ==============================================================
# IDENTIFY SERVICE — porta 28083
# Login, OAuth Google, refresh token, perfil, RBAC
# ==============================================================
location ^~ /api/identify/ {
    include snippets/proxy-params.conf;
    proxy_pass http://finlumia_identify;

    # Login pode demorar (bcrypt + DB): timeout maior
    proxy_read_timeout 30s;
}

# ==============================================================
# MOVEMENT SERVICE — porta 28084
# Transações, importação de arquivos, categorias, instituições
# ==============================================================

# Categorias e instituições são públicas (sem JWT)
location ^~ /api/v1/categories {
    include snippets/proxy-params.conf;
    proxy_pass http://finlumia_movement;
}

location ^~ /api/v1/institutions {
    include snippets/proxy-params.conf;
    proxy_pass http://finlumia_movement;
}

# Importação de arquivo: payload grande, timeout longo
location ^~ /api/v1/transactions/import {
    include snippets/proxy-params.conf;
    proxy_pass         http://finlumia_movement;
    client_max_body_size 50M;
    proxy_read_timeout   300s;   # OCR pode demorar
    proxy_send_timeout   300s;
}

# CRUD de transações
location ^~ /api/v1/transactions {
    include snippets/proxy-params.conf;
    proxy_pass http://finlumia_movement;
}

# ==============================================================
# DOCUMENT SERVICE — porta 28085
# Relatórios e exportações (PDF, CSV, XLSX)
# ==============================================================

# Export pode gerar arquivos grandes — timeout longo
location ^~ /api/v1/export {
    include snippets/proxy-params.conf;
    proxy_pass         http://finlumia_document;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # Permite streaming do arquivo exportado sem buffering
    proxy_buffering    off;
}

location ^~ /api/v1/reports {
    include snippets/proxy-params.conf;
    proxy_pass         http://finlumia_document;
    proxy_read_timeout 120s;
}

# ==============================================================
# DOCS SERVICE — porta 28082
# Documentação pública da API + sistema de suporte (tickets)
# ==============================================================

location ^~ /api/v1/support {
    include snippets/proxy-params.conf;
    proxy_pass         http://finlumia_docs;
    client_max_body_size 20M;   # Anexos de tickets
}

location ^~ /api/v1/docs {
    include snippets/proxy-params.conf;
    proxy_pass http://finlumia_docs;
}

# ==============================================================
# MINIO — storage de anexos de ticket (fotos, vídeos, documentos)
# Presigned URLs geradas pelo docs apontam pra cá. proxy_buffering e
# proxy_request_buffering off são obrigatórios: sem isso o nginx
# bufferiza o arquivo inteiro (upload ou download) antes de repassar,
# reintroduzindo o problema de RAM que a URL assinada evita na aplicação.
# ==============================================================
location ^~ /storage/ {
    include snippets/proxy-params.conf;
    proxy_pass          http://finlumia_minio/;
    proxy_buffering      off;
    proxy_request_buffering off;
    client_max_body_size 100M;
    proxy_read_timeout   300s;
    proxy_send_timeout   300s;
}

# ==============================================================
# CONFIGURATOR SERVICE — porta 28081
# Administração de tabelas, campos, índices, funções, triggers
# ==============================================================
location ^~ /v1/config/ {
    include snippets/proxy-params.conf;
    proxy_pass http://finlumia_configurator;
}

# ==============================================================
# FRONTEND Next.js — porta 3000
# Tudo que não casou com os blocos acima vai para o Next.js
# ==============================================================

# Hot-reload WebSocket do Next.js (dev) e WebSocket de produção
location ^~ /_next/webpack-hmr {
    include snippets/proxy-params.conf;
    proxy_pass          http://finlumia_frontend;
    proxy_http_version  1.1;
    proxy_set_header    Upgrade    $http_upgrade;
    proxy_set_header    Connection "upgrade";
}

# Assets estáticos do Next.js — cache longo
location ^~ /_next/static/ {
    include snippets/proxy-params.conf;
    proxy_pass http://finlumia_frontend;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
}

# Tudo o mais vai para o Next.js (SSR / páginas)
location / {
    include snippets/proxy-params.conf;
    proxy_pass http://finlumia_frontend;

    # Necessário para SSE (Server-Sent Events) do Next.js
    proxy_read_timeout  3600s;
    proxy_buffering     off;
    proxy_cache_bypass  $http_upgrade;
}
