##############################################################
# security-headers.conf — Cabeçalhos de segurança HTTP
# Include no bloco server: include snippets/security-headers.conf;
#
# ATENÇÃO: NÃO incluir headers CORS aqui.
# O CORS é gerenciado pelo Spring Security em cada microserviço
# (ModuleSecurityConfig.corsConfigurationSource). Adicionar
# Access-Control-Allow-Origin aqui causaria headers duplicados
# e o browser rejeitaria a resposta.
##############################################################

# Previne clickjacking
add_header  X-Frame-Options         "SAMEORIGIN"            always;

# Previne sniffing de MIME type
add_header  X-Content-Type-Options  "nosniff"               always;

# Força HTTPS (só usar quando SSL estiver ativo)
# add_header  Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# Controle de referrer
add_header  Referrer-Policy         "strict-origin-when-cross-origin" always;

# Permissões de browser APIs
add_header  Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
