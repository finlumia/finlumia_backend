##############################################################
# finlumia-prod.conf — Servidor HTTPS para produção
#
# Pré-requisito: certificados TLS emitidos pelo Let's Encrypt
#   certbot certonly --nginx -d app.finlumia.com.br
#
# Variáveis de ambiente que devem ser definidas no deploy:
#   ALLOWED_ORIGINS=https://app.finlumia.com.br
#
# Substituir "app.finlumia.com.br" pelo domínio real.
##############################################################

# ----------------------------------------------------------
# Redireciona HTTP → HTTPS (301 permanente)
# ----------------------------------------------------------
server {
    listen      80;
    server_name app.finlumia.com.br;

    # Necessário para renovação automática do Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ----------------------------------------------------------
# Servidor HTTPS principal
# ----------------------------------------------------------
server {
    listen       443 ssl;
    http2        on;
    server_name  app.finlumia.com.br;

    # ---- Certificados TLS (Let's Encrypt) ----
    ssl_certificate      /etc/letsencrypt/live/app.finlumia.com.br/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/app.finlumia.com.br/privkey.pem;

    # ---- Configuração TLS segura (Mozilla Modern 2024) ----
    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers  off;
    ssl_session_cache          shared:SSL:10m;
    ssl_session_timeout        1d;
    ssl_session_tickets        off;

    # OCSP Stapling (melhora performance TLS)
    ssl_stapling             on;
    ssl_stapling_verify      on;
    ssl_trusted_certificate  /etc/letsencrypt/live/app.finlumia.com.br/chain.pem;
    resolver                 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout         5s;

    # ---- Security Headers (inclui HSTS para produção) ----
    include snippets/security-headers.conf;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Content-Security-Policy — ajuste conforme os recursos usados pelo frontend
    # 'unsafe-inline' pode ser removido quando o Next.js usar nonces
    add_header Content-Security-Policy
        "default-src 'self'; "
        "script-src 'self' 'unsafe-inline' 'unsafe-eval'; "
        "style-src 'self' 'unsafe-inline'; "
        "img-src 'self' data: blob:; "
        "font-src 'self' data:; "
        "connect-src 'self' https://app.finlumia.com.br; "
        "frame-ancestors 'none';"
        always;

    # ---- Roteamento (compartilhado com homolog) ----
    include snippets/routing.conf;
}
