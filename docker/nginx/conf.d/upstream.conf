##############################################################
# upstream.conf — Definição dos servidores upstream
#
# Os nomes (identify, movement, etc.) correspondem ao nome
# do serviço no docker-compose. Em bare-metal substitua por
# 127.0.0.1:<porta>.
##############################################################

# ----- Microserviços backend -----

upstream finlumia_identify {
    server identify:28083;
    keepalive 32;
}

upstream finlumia_movement {
    server movement:28084;
    keepalive 32;
}

upstream finlumia_document {
    server document:28085;
    keepalive 32;
}

upstream finlumia_configurator {
    server configurator:28081;
    keepalive 32;
}

# docs também hospeda o sistema de suporte (tickets)
upstream finlumia_docs {
    server docs:28082;
    keepalive 16;
}

# ----- Frontend Next.js -----
upstream finlumia_frontend {
    server frontend:3000;
    keepalive 16;
}
