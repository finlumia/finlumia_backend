##############################################################
# finlumia-homolog.conf — Servidor HTTP para homologação
#
# Usar quando: ambiente de homolog sem TLS direto no Nginx
# (ex: TLS termina no load balancer da cloud antes do Nginx).
#
# Variáveis de ambiente que devem ser definidas no deploy:
#   ALLOWED_ORIGINS=https://homolog.finlumia.com.br
##############################################################

server {
    listen       80;
    server_name  homolog.finlumia.com.br _;

    include snippets/security-headers.conf;

    # ----------------------------------------------------------
    # Bloco de roteamento reutilizado nos outros ambientes.
    # Mantido num include separado para evitar duplicação entre
    # finlumia-homolog.conf e finlumia-prod.conf.
    # ----------------------------------------------------------
    include snippets/routing.conf;
}
