##############################################################
# nginx.conf — Configuração global do Nginx para o Finlumia
##############################################################

user  nginx;
worker_processes  auto;          # 1 worker por CPU automaticamente
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    multi_accept        on;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --------------------------------------------------------
    # Formato de log com informações úteis para debug de CORS
    # --------------------------------------------------------
    log_format  main  '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      'origin="$http_origin" '
                      'rt=$request_time';

    access_log  /var/log/nginx/access.log  main;

    # --------------------------------------------------------
    # Performance
    # --------------------------------------------------------
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;
    server_tokens       off;   # Não expõe versão do Nginx

    # --------------------------------------------------------
    # Upload: transações por arquivo e anexos de suporte
    # --------------------------------------------------------
    client_max_body_size  50M;
    client_body_timeout   60s;

    # --------------------------------------------------------
    # Compressão gzip (JSON e texto beneficiam bastante)
    # --------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        application/octet-stream;

    # --------------------------------------------------------
    # Buffers de proxy (evita disco para respostas pequenas)
    # --------------------------------------------------------
    proxy_buffering           on;
    proxy_buffer_size         16k;
    proxy_buffers             8 16k;
    proxy_busy_buffers_size   32k;

    # --------------------------------------------------------
    # Timeouts de proxy (export de relatório pode demorar)
    # --------------------------------------------------------
    proxy_connect_timeout  10s;
    proxy_send_timeout     120s;
    proxy_read_timeout     120s;
    send_timeout           120s;

    # --------------------------------------------------------
    # Carrega os blocos de servidor por ambiente
    # --------------------------------------------------------
    include /etc/nginx/conf.d/*.conf;
}
