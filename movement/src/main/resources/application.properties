spring.config.import=optional:classpath:shared.properties,optional:classpath:shared-dev.properties
spring.application.name=movement
server.port=28084
springdoc.swagger-ui.enabled=false
springdoc.api-docs.path=/internal/docs/api-docs

# CategoryController/InstitutionController nao exigem usersKey (nao dependem do
# usuario logado) e devem ser acessiveis sem JWT, como documentado na API.
finlumia.movement.security.public-api.paths[0]=/api/v1/categories
finlumia.movement.security.public-api.paths[1]=/api/v1/institutions
