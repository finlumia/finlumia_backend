# === Banco de dados ===
spring.datasource.url=jdbc:postgresql://localhost:5432/finlumia_transactions
spring.datasource.username=postgres
spring.datasource.password=123456

# === Pool de conexoes (HikariCP) ===
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.security.user.name=admin
spring.security.user.password=admin123

# === Mapeamento de chave string para keyUser numerico ===
# Exemplo de envio no header: keyUser: local-dev-key
finlumia.security.key-user-map.local-dev-key=1

