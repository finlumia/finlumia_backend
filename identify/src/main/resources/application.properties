spring.config.import=optional:classpath:shared.properties
spring.security.user.name=
spring.security.user.password=
spring.application.name=identify
server.port=28083
springdoc.swagger-ui.enabled=false
springdoc.api-docs.path=/internal/docs/api-docs

finlumia.identify.jwt.issuer=finlumia-identify
finlumia.identify.jwt.secret=finlumia-dev-jwt-secret-change-me-in-production-min-32-chars
finlumia.identify.jwt.access-token-expiration-seconds=900
finlumia.identify.jwt.refresh-token-expiration-seconds=604800

finlumia.identify.security.public-api.paths[0]=/api/identify/token
finlumia.identify.security.public-api.paths[1]=/api/identify/token/**
