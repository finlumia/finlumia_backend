# === Banco de dados ===
spring.datasource.url=jdbc:postgresql://localhost:28079/finlumia_transactions
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# === Pool de conexoes (HikariCP) ===
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# === Mapeamento de chave string para keyUser numerico ===
# Exemplo de envio no header: keyUser: local-dev-key
finlumia.security.key-user-map.local-dev-key=

# === Seguranca de APIs internas (service-to-service) ===
finlumia.security.internal.header-name=X-Internal-Service-Token
finlumia.security.internal.service-token=${FINLUMIA_INTERNAL_TOKEN}
finlumia.security.module-api.docs-origin=${DOCS_ORIGIN:http://localhost:28082}
finlumia.security.module-api.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}

# === JWT (compartilhado: todos os servicos que validam tokens do identify) ===
finlumia.identify.jwt.issuer=finlumia-identify
finlumia.identify.jwt.secret=${JWT_SECRET}
finlumia.identify.jwt.access-token-expiration-seconds=900
finlumia.identify.jwt.refresh-token-expiration-seconds=604800

# === E-mail (SMTP generico — cadastro, verificacao de e-mail, recuperacao de senha) ===
spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
finlumia.mail.from.account=${MAIL_FROM_ACCOUNT}
finlumia.mail.from.recover=${MAIL_FROM_RECOVER}
finlumia.mail.reply-to=${MAIL_REPLY_TO}

# === Login com Google (verificacao do idToken no backend) ===
finlumia.identify.google.client-id=${GOOGLE_CLIENT_ID}
