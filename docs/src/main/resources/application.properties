spring.config.import=optional:classpath:shared.properties,optional:classpath:shared-${spring.profiles.active:local}.properties
spring.application.name=docs
server.address=0.0.0.0
server.port=28082

# OpenAPI do proprio modulo docs
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/docs/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.urls-primary-name=identify

# Swagger publico: URLs relativas via proxy (evita CORS e localhost fixo no browser)
springdoc.swagger-ui.urls[0].name=configurator
springdoc.swagger-ui.urls[0].url=/docs/public/api-docs/configurator/external

springdoc.swagger-ui.urls[1].name=identify
springdoc.swagger-ui.urls[1].url=/docs/public/api-docs/identify/external

springdoc.swagger-ui.urls[2].name=movement
springdoc.swagger-ui.urls[2].url=/docs/public/api-docs/movement/external

springdoc.swagger-ui.urls[3].name=docs
springdoc.swagger-ui.urls[3].url=/v3/api-docs/docs

springdoc.swagger-ui.urls[4].name=support
springdoc.swagger-ui.urls[4].url=/v3/api-docs/external

# Admin (APIs internas) — exige autenticacao HTTP Basic
docs.security.admin.username=${DOCS_ADMIN_USERNAME:admin}
docs.security.admin.password=${DOCS_ADMIN_PASSWORD}

# Base URL dos microservicos (server-side proxy)
docs.modules.base-url.configurator=http://localhost:28081
docs.modules.base-url.identify=http://localhost:28083
docs.modules.base-url.movement=http://localhost:28084

# CORS — origins permitidas para a API de suporte (default de dev local;
# hom/prod sobrescrevem via DOCS_ORIGIN/ALLOWED_ORIGINS no shared-<profile>.properties)
finlumia.security.module-api.docs-origin=${DOCS_ORIGIN:http://localhost:28082}
finlumia.security.module-api.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}

# JWT — issuer do modulo identify (o segredo vem do shared-<profile>.properties)
finlumia.identify.jwt.issuer=finlumia-identify

# Upload de anexos de suporte
finlumia.support.upload-dir=${SUPPORT_UPLOAD_DIR:uploads/support}
