springdoc.swagger-ui.disable-swagger-default-url=true

springdoc.swagger-ui.urls[0].name=configurator
springdoc.swagger-ui.urls[0].url=http://localhost:40571/internal/docs/api-docs

springdoc.swagger-ui.urls[1].name=docs
springdoc.swagger-ui.urls[1].url=http://localhost:40574/v3/api-docs

springdoc.swagger-ui.urls[2].name=identity
springdoc.swagger-ui.urls[2].url=http://localhost:40572/internal/docs/api-docs

springdoc.swagger-ui.urls[3].name=movement
springdoc.swagger-ui.urls[3].url=http://localhost:40573/internal/docs/api-docs

docs.security.admin.username=admin
docs.security.admin.password=admin123